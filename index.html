<!DOCTYPE html>
<html>
<head>
  <title>Bible Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Greeting -->
  <p class="greeting-label">Daily Reflection</p>
  <h1 class="greeting">Good Morning ✨</h1>

  <!-- Verse Card -->
  <div class="card">
    <p class="label">Verse of the day</p>

    <h2 class="verse">
      “For I know the plans I have for you...”
    </h2>

    <div class="meta">
      <span>Jeremiah 29:11</span>
      <span>1 min read</span>
    </div>
  </div>

  <!-- Topics -->
  <div class="card">
    <p class="label">Explore Topics</p>

    <div class="topic-grid">
      <div class="topic">
        ✨
        <span>Peace</span>
      </div>

      <div class="topic">
        🙏
        <span>Faith</span>
      </div>

      <div class="topic">
        ❤️
        <span>Love</span>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-box" id="answer"></div>

</div>

<!-- Input -->
<div class="input-wrap">
  <div class="input-bar">
    <input id="question" placeholder="Ask something..." />
    <button onclick="askAI()">➜</button>
  </div>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <a href="#">Home</a>
  <a href="#">Chat</a>
  <a href="#">Profile</a>
</div>

<script src="script.js"></script>

</body>
